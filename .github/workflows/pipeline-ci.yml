name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - run: npm ci --ignore-scripts

      - run: npm test --workspace=frontend
```

El cambio clave es `cache-dependency-path: "**/package-lock.json"` que busca el lockfile en cualquier nivel del monorepo.

Pero para saber exactamente por qué falló, necesito el **log completo del job** de GitHub Actions. Ve a:
```
GitHub → tu repo → Actions → el workflow fallido → Frontend Tests → clic en el paso que falla
