name: CI

# S'executa en PRs cap a main i en pushes directes a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    # Màquina virtual on s'executen els tests
    runs-on: ubuntu-latest
    steps:
      # Clona el repositori
      - uses: actions/checkout@v4

      # Instal·la Node.js i cacheja les dependències per anar més ràpid
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Instal·la les dependències des de l'arrel (monorepo amb workspaces)
      # --ignore-scripts evita executar husky, que no cal a CI
      - run: npm ci --ignore-scripts

      # Executa els tests del frontend — si fallen, la pipeline falla i bloqueja el merge
      - run: npm test --workspace=frontend
